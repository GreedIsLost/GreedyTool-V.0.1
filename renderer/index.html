<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Greed - Steam Tool</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2e, #2a2a40);
      color: #fff;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(0,0,0,0.4);
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 {
      text-align: center;
      color: #00ff9d;
      margin-bottom: 30px;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #333;
      border: 1px solid #555;
      border-radius: 6px;
      color: white;
      font-size: 16px;
    }
    button {
      background: #00ff9d;
      color: black;
      border: none;
      padding: 14px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      background: #00cc7a;
    }
    pre {
      background: #1a1a2e;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      max-height: 300px;
    }
    #status {
      margin: 15px 0;
      padding: 12px;
      border-radius: 6px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🟢 Greed</h1>
    <p style="text-align:center; color:#aaa;">Steam Manifest & Lua Tool</p>

    <input type="text" id="appid" placeholder="Enter Steam App ID (e.g. 730)" />
    <input type="text" id="title" placeholder="Game Title (optional)" />

    <button id="generate">Generate & Download</button>

    <div id="status"></div>
    <pre id="output"></pre>
  </div>

  <script src="app.js"></script>
</body>
</html>
