<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b2838"/>
      <stop offset="100%" style="stop-color:#171a21"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#66c0f4"/>
      <stop offset="100%" style="stop-color:#a4d007"/>
    </linearGradient>
    <linearGradient id="subtitle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#66c0f4"/>
      <stop offset="100%" style="stop-color:#8091a3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" rx="12" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="40" x2="600" y2="40" stroke="#66c0f4" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="600" y2="80" stroke="#66c0f4" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="600" y2="120" stroke="#66c0f4" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="600" y2="160" stroke="#66c0f4" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="200" stroke="#66c0f4" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="200" stroke="#66c0f4" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="200" stroke="#66c0f4" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="200" stroke="#66c0f4" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="200" stroke="#66c0f4" stroke-width="0.5"/>
  </g>

  <!-- Accent line -->
  <rect x="0" y="0" width="600" height="3" fill="url(#accent)"/>

  <!-- G icon -->
  <circle cx="75" cy="100" r="40" fill="none" stroke="#66c0f4" stroke-width="2.5" opacity="0.3"/>
  <text x="75" y="112" font-family="monospace" font-size="40" font-weight="bold" fill="#66c0f4" text-anchor="middle">G</text>

  <!-- Title -->
  <text x="135" y="90" font-family="monospace" font-size="36" font-weight="bold" fill="#d6e0e8" letter-spacing="2">GREEDYTOOL</text>

  <!-- Subtitle -->
  <text x="135" y="118" font-family="sans-serif" font-size="14" fill="url(#subtitle)" letter-spacing="4">STEAM MANIFEST &amp; LUA TOOL</text>

  <!-- Badge pills -->
  <rect x="135" y="135" rx="4" ry="4" width="70" height="20" fill="#47848F" opacity="0.8"/>
  <text x="170" y="149" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle">Electron</text>

  <rect x="215" y="135" rx="4" ry="4" width="70" height="20" fill="#339933" opacity="0.8"/>
  <text x="250" y="149" font-family="sans-serif" font-size="10" fill="#fff" text-anchor="middle">Node.js</text>

  <rect x="295" y="135" rx="4" ry="4" width="70" height="20" fill="#a4d007" opacity="0.8"/>
  <text x="330" y="149" font-family="sans-serif" font-size="10" fill="#1b2838" text-anchor="middle">SAM</text>

  <!-- Version -->
  <text x="550" y="185" font-family="monospace" font-size="10" fill="#4d5e70" text-anchor="end">v2.1.0</text>
</svg>
