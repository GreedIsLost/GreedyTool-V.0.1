name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: GreedyTool-${{ matrix.os }}
          path: dist/

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: GreedyTool-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.AppImage
            **/*.deb
            **/*.exe
            **/*.dmg
            **/*.zip
          generate_release_notes: true
